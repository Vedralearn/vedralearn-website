<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - VedraLearn</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #0072ff 0%, #0056cc 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .admin-login-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            max-width: 500px;
            width: 100%;
            margin: 1rem;
        }

        .login-header {
            background: linear-gradient(135deg, #0072ff 0%, #0056cc 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }

        .login-header h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 700;
        }

        .login-header p {
            margin: 0.5rem 0 0 0;
            opacity: 0.9;
            font-size: 0.95rem;
        }

        .login-body {
            padding: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #0a2540;
            font-size: 0.95rem;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid #e5e7eb;
            border-radius: 6px;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #0072ff;
            box-shadow: 0 0 0 3px rgba(0, 114, 255, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #0072ff 0%, #0056cc 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 114, 255, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            display: none;
            border-left: 4px solid #dc2626;
        }

        .success-message {
            background: #dcfce7;
            color: #15803d;
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            display: none;
            border-left: 4px solid #15803d;
        }

        .demo-credentials {
            background: #f0f9ff;
            border-left: 4px solid #0284c7;
            padding: 1rem;
            border-radius: 6px;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #0c4a6e;
        }

        .demo-credentials strong {
            display: block;
            margin-bottom: 0.5rem;
            color: #0a2540;
        }

        .back-link {
            display: inline-block;
            margin-top: 1rem;
            color: #0072ff;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: #0056cc;
        }

        @media (max-width: 480px) {
            .admin-login-container {
                border-radius: 0;
            }

            .login-header {
                padding: 1.5rem;
            }

            .login-header h1 {
                font-size: 1.4rem;
            }

            .login-body {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="admin-login-container">
        <div class="login-header">
            <h1>🔐 Admin Portal</h1>
            <p>VedraLearn Technologies</p>
        </div>
        <div class="login-body">
            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <form id="adminLoginForm">
                <div class="form-group">
                    <label for="email">Admin Email</label>
                    <input type="email" id="email" name="email" placeholder="admin@vedralearn.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="admin123" required>
                </div>

                <button type="submit" class="login-btn">Login to Dashboard</button>
            </form>

            <div class="demo-credentials">
                <strong>Demo Admin Credentials:</strong>
                Email: admin@vedralearn.com<br>
                Password: admin123
            </div>

            <a href="index.html" class="back-link">← Back to Home</a>
        </div>
    </div>

    <script>
        // Demo credentials for testing without backend
        const DEMO_CREDENTIALS = {
            email: 'admin@vedralearn.com',
            password: 'admin123'
        };

        // Check if backend is available
        async function isBackendAvailable() {
            try {
                const response = await fetch('/api/health', { timeout: 2000 });
                return response.ok;
            } catch (error) {
                return false;
            }
        }

        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMessage');
            const successMsg = document.getElementById('successMessage');

            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            try {
                // First check if backend is available
                const backendAvailable = await isBackendAvailable();

                if (backendAvailable) {
                    // Use Production API
                    const response = await fetch('/api/admin/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        localStorage.setItem('adminToken', data.token);
                        localStorage.setItem('adminEmail', email);
                        localStorage.setItem('authMode', 'production');
                        successMsg.textContent = '✓ Login successful! Redirecting...';
                        successMsg.style.display = 'block';
                        setTimeout(() => {
                            window.location.href = 'admin-dashboard.html';
                        }, 1500);
                    } else {
                        errorMsg.textContent = '✗ ' + (data.message || 'Login failed. Check credentials.');
                        errorMsg.style.display = 'block';
                    }
                } else {
                    // Use Local Authentication (Demo Mode)
                    if (email === DEMO_CREDENTIALS.email && password === DEMO_CREDENTIALS.password) {
                        // Create a demo token
                        const demoToken = 'demo_' + btoa(email + ':' + new Date().getTime());
                        localStorage.setItem('adminToken', demoToken);
                        localStorage.setItem('adminEmail', email);
                        localStorage.setItem('authMode', 'demo');
                        
                        successMsg.textContent = '✓ Demo Login successful! Redirecting... (Backend not running - using demo data)';
                        successMsg.style.display = 'block';
                        setTimeout(() => {
                            window.location.href = 'admin-dashboard.html';
                        }, 1500);
                    } else {
                        errorMsg.textContent = '✗ Invalid credentials. Use: admin@vedralearn.com / admin123';
                        errorMsg.style.display = 'block';
                    }
                }
            } catch (error) {
                console.error('Login error:', error);
                
                // Fallback to demo auth if error
                if (email === DEMO_CREDENTIALS.email && password === DEMO_CREDENTIALS.password) {
                    const demoToken = 'demo_' + btoa(email + ':' + new Date().getTime());
                    localStorage.setItem('adminToken', demoToken);
                    localStorage.setItem('adminEmail', email);
                    localStorage.setItem('authMode', 'demo');
                    
                    successMsg.textContent = '✓ Demo Login successful! Redirecting... (Demo Mode)';
                    successMsg.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = 'admin-dashboard.html';
                    }, 1500);
                } else {
                    errorMsg.textContent = '✗ Connection error. Using demo credentials: admin@vedralearn.com / admin123';
                    errorMsg.style.display = 'block';
                }
            }
        });
    </script>
</body>
</html>
